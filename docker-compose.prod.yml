# =============================================================================
# VZY OTT Verification Agent — Production Docker Compose
# =============================================================================
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml logs -f
#   docker compose -f docker-compose.prod.yml down
# =============================================================================

version: '3.9'

services:
  # ---------- Nginx Reverse Proxy (HTTPS + routing) ----------
  nginx:
    image: nginx:alpine
    container_name: vzy-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/aws/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - dashboard
      - agent
    networks:
      - agent-network

  # ---------- Core Agent Service (Backend API + Scanners) ----------
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vzy-agent
    restart: unless-stopped
    env_file: .env.production
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://vzy:${DB_PASSWORD}@postgres:5432/vzy_agent
      REDIS_URL: redis://redis:6379
      # Chrome/Lighthouse Docker flags (Google Chrome, not Chromium)
      CHROME_PATH: /usr/bin/google-chrome-stable
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome-stable
    # Chrome needs large /dev/shm for stable tracing (default 64MB is too small)
    shm_size: '2gb'
    volumes:
      - scan-results:/app/scan-results
      - logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
        reservations:
          memory: 2G
          cpus: '1.0'
    networks:
      - agent-network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ---------- PostgreSQL ----------
  postgres:
    image: postgres:16-alpine
    container_name: vzy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vzy_agent
      POSTGRES_USER: vzy
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    # No port binding — only accessible within Docker network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vzy -d vzy_agent"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agent-network
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ---------- Redis ----------
  redis:
    image: redis:7-alpine
    container_name: vzy-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redis-data:/data
    # No port binding — only accessible within Docker network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agent-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------- Dashboard (Next.js Frontend) ----------
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: vzy-dashboard
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_BASE_URL: http://agent:3000
      NEXT_PUBLIC_API_URL: /api
      NEXT_PUBLIC_WS_URL: https://${DOMAIN:-localhost}
    depends_on:
      - agent
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    networks:
      - agent-network
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  scan-results:
    driver: local
  logs:
    driver: local

networks:
  agent-network:
    driver: bridge
